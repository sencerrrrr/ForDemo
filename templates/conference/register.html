{% extends 'base.html' %}
{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="row g-4">
                    <div>
                        <div class="card shadow-sm">
                            <div class="card-body p-4 p-lg-5">
                                <form method="post" novalidate>
                                    {% csrf_token %}
                                    {% for field in form %}
                                        <div class="mb-3 {% if field.errors %}has-error{% endif %}">
                                            <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                            {{ field }}
                                            {% if field.help_text %}
                                                <div class="form-text">{{ field.help_text }}</div>
                                            {% endif %}
                                            {% for error in field.errors %}
                                                <div class="invalid-feedback d-block">{{ error }}</div>
                                            {% endfor %}
                                        </div>
                                    {% endfor %}

                                    <button type="submit" class="btn w-100" id="button">Зарегистрироваться</button>

                                    <div class="d-flex flex-wrap justify-content-between gap-2 mt-3 small">
                                        <span class="text-muted">Уже зарегистрированы?</span>
                                        <a href="{% url 'login' %}">Войти</a>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
